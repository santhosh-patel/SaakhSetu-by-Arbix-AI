services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saakhsetu-backend
    ports:
      - "8000:8000"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      SAAKHSETU_DATA_DIR: /data
      SAAKHSETU_DB_PATH: /data/saakhsetu.db
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    volumes:
      - backend-data:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: saakhsetu-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend-data:
